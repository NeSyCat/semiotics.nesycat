        - generic [ref=e39]: § 1 Motivation
        - heading "Domain theory, drawn." [level=2] [ref=e40]
      - generic [ref=e41]:
        - paragraph [ref=e42]:
          - text: NeSyCat —
          - emphasis [ref=e43]: Neuro-Symbolic Category
          - text: — sits at the intersection of category theory, deep learning, and formal logic. Researchers already think in string diagrams. The editor just gives those diagrams a live canvas and a JSON spine so they can feed a codegen pipeline.
        - paragraph [ref=e44]:
          - text: "The tool is deliberately narrow: four shape primitives, one empty carrier, two edge modes, no chrome beyond Kinds and JSON. The canvas"
          - emphasis [ref=e45]: is
          - text: the product.
